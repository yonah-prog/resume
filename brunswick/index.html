document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ange: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* cyrillic-ext */\n@font-face {\n  font-family: 'IBM Plex Serif';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"773b2609-e7bb-447e-9c98-3b15d9a0b368\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'IBM Plex Serif';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"cf2386d5-658e-4569-a2da-a7142e771db8\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Serif';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"fd9ce0b5-785b-49b9-bed0-141912a6e6cd\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'IBM Plex Serif';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"2c450132-0229-42cb-995a-a49c7abbf16e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Serif';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"ed26db44-0c2f-4a11-82f1-086713ba756f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --ink:#111;\n    --ink-2:#3a3a3a;\n    --muted:#6b6b6b;\n    --line:#cfcfcf;\n    --line-2:#e6e6e6;\n    --bg:#fafafa;\n    --paper:#fff;\n    --box:#ececec;\n    --box-2:#dcdcdc;\n    --accent:#111;\n    --maxw:1240px;\n    --pad:48px;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);}\n  body{\n    font-family:\"IBM Plex Sans\", system-ui, -apple-system, sans-serif;\n    font-size:15px;\n    line-height:1.5;\n    -webkit-font-smoothing:antialiased;\n  }\n  .mono{font-family:\"IBM Plex Mono\", ui-monospace, monospace;}\n  .serif{font-family:\"IBM Plex Serif\", Georgia, serif;}\n  a{color:inherit;text-decoration:none;}\n  button{font:inherit;color:inherit;background:none;border:0;cursor:pointer;}\n  hr{border:0;border-top:1px solid var(--line);margin:0;}\n\n  /* === Wireframe annotation bar at top === */\n  .wf-bar{\n    position:sticky;top:0;z-index:100;\n    background:#111;color:#fff;\n    font-family:\"IBM Plex Mono\", monospace;\n    font-size:11px;letter-spacing:.08em;text-transform:uppercase;\n    padding:8px 24px;\n    display:flex;gap:24px;align-items:center;justify-content:space-between;\n  }\n  .wf-bar .dot{width:8px;height:8px;border-radius:50%;background:#fff;display:inline-block;margin-right:8px;}\n  .wf-bar a.tab{opacity:.6;cursor:pointer;}\n  .wf-bar a.tab:hover{opacity:1;}\n\n  /* === Layout === */\n  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--pad);}\n  section{padding:96px 0;border-top:1px solid var(--line);background:var(--paper);}\n  section:first-of-type{border-top:0;}\n  .section-label{\n    font-family:\"IBM Plex Mono\", monospace;\n    font-size:11px;letter-spacing:.18em;text-transform:uppercase;\n    color:var(--muted);\n    display:flex;align-items:center;gap:10px;\n    margin-bottom:48px;\n  }\n  .section-label::before{\n    content:\"\";display:inline-block;width:24px;height:1px;background:var(--ink);\n  }\n  h1,h2,h3,h4{margin:0;font-weight:500;letter-spacing:-0.01em;}\n  h1{font-size:64px;line-height:1.05;letter-spacing:-0.02em;}\n  h2{font-size:44px;line-height:1.1;letter-spacing:-0.02em;}\n  h3{font-size:22px;line-height:1.25;}\n  h4{font-size:16px;line-height:1.3;}\n  p{margin:0;}\n  .lede{font-size:18px;line-height:1.5;color:var(--ink-2);max-width:62ch;}\n\n  /* === Nav === */\n  .nav{\n    position:sticky;top:29px;z-index:90;\n    background:rgba(255,255,255,.92);\n    backdrop-filter:saturate(140%) blur(8px);\n    border-bottom:1px solid var(--line);\n  }\n  .nav-inner{\n    max-width:var(--maxw);margin:0 auto;padding:18px var(--pad);\n    display:flex;align-items:center;justify-content:space-between;gap:24px;\n  }\n  .logo{display:flex;align-items:center;gap:10px;font-weight:600;letter-spacing:-0.01em;font-size:18px;}\n  .logo-mark{\n    width:26px;height:26px;border:1.5px solid var(--ink);\n    display:grid;place-items:center;font-family:\"IBM Plex Mono\",monospace;font-size:12px;font-weight:600;\n  }\n  .nav-links{display:flex;gap:28px;align-items:center;}\n  .nav-links a{font-size:14px;color:var(--ink-2);}\n  .nav-links a:hover{color:var(--ink);}\n  .btn{\n    display:inline-flex;align-items:center;gap:10px;\n    padding:11px 18px;border:1px solid var(--ink);\n    font-size:14px;font-weight:500;\n    background:var(--ink);color:#fff;\n    transition:transform .15s ease;\n  }\n  .btn.ghost{background:transparent;color:var(--ink);}\n  .btn:hover{transform:translateY(-1px);}\n  .btn .arr{display:inline-block;transition:transform .2s ease;}\n  .btn:hover .arr{transform:translateX(4px);}\n\n  /* === Hero === */\n  .hero{padding:120px 0 80px;}\n  .hero-eyebrow{\n    font-family:\"IBM Plex Mono\", monospace;\n    font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);\n    display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:48px;\n  }\n  .hero-eyebrow span:not(:last-child)::after{\n    content:\"·\";margin-left:14px;color:var(--line);\n  }\n  .hero h1{max-width:18ch;margin-bottom:28px;}\n  .hero .lede{max-width:60ch;margin-bottom:48px;}\n  .hero-ctas{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:96px;}\n\n  .stat-bar{\n    display:grid;grid-template-columns:repeat(3,1fr);\n    border-top:1px solid var(--line);\n    border-bottom:1px solid var(--line);\n  }\n  .stat{padding:36px 0;border-right:1px solid var(--line);}\n  .stat:last-child{border-right:0;}\n  .stat .num{font-size:40px;font-weight:500;letter-spacing:-0.02em;line-height:1;margin-bottom:10px;}\n  .stat .lbl{font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}\n\n  /* === What we do (Pillars) === */\n  .pillars-head{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;margin-bottom:64px;}\n  .pillars-head h2{max-width:14ch;}\n  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--ink);}\n  .pillar{\n    padding:32px 28px 32px 0;\n    border-right:1px solid var(--line);\n    display:flex;flex-direction:column;\n    min-height:340px;\n  }\n  .pillar:last-child{border-right:0;padding-right:0;}\n  .pillar:not(:first-child){padding-left:28px;}\n  .pillar .idx{\n    font-family:\"IBM Plex Mono\",monospace;font-size:12px;\n    color:var(--muted);margin-bottom:64px;\n  }\n  .pillar h3{font-size:28px;margin-bottom:14px;letter-spacing:-0.01em;}\n  .pillar p{color:var(--ink-2);margin-bottom:auto;}\n  .pillar .more{\n    margin-top:32px;\n    font-family:\"IBM Plex Mono\",monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;\n    display:inline-flex;align-items:center;gap:8px;\n    cursor:pointer;\n  }\n  .pillar .more .arr{transition:transform .2s ease;}\n  .pillar:hover .more .arr{transform:translateX(4px);}\n\n  /* === Locker room (Roster) === */\n  .roster-head{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;margin-bottom:48px;}\n  .filters{\n    display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;\n    font-family:\"IBM Plex Mono\",monospace;font-size:12px;\n  }\n  .filter{\n    padding:8px 14px;border:1px solid var(--line);\n    letter-spacing:.08em;text-transform:uppercase;\n    cursor:pointer;\n  }\n  .filter.is-active{background:var(--ink);color:#fff;border-color:var(--ink);}\n  .roster{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}\n  .athlete{\n    border:1px solid var(--line);background:var(--paper);\n    transition:transform .15s ease, border-color .15s ease;\n    cursor:pointer;\n  }\n  .athlete:hover{transform:translateY(-2px);border-color:var(--ink);}\n  .athlete .photo{\n    aspect-ratio:4/5;background:var(--box);\n    position:relative;border-bottom:1px solid var(--line);\n    display:grid;place-items:center;\n    color:var(--muted);font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;\n  }\n  .athlete .photo::after{\n    content:\"\";position:absolute;inset:0;\n    background:\n      linear-gradient(45deg,transparent 49%,var(--line) 49% 51%, transparent 51%),\n      linear-gradient(-45deg,transparent 49%,var(--line) 49% 51%, transparent 51%);\n    opacity:.5;\n  }\n  .athlete .photo span{position:relative;z-index:1;background:var(--box);padding:4px 8px;}\n  .athlete .meta{padding:16px;}\n  .athlete .tag{\n    display:inline-flex;align-items:center;gap:8px;\n    font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.12em;\n    color:var(--muted);margin-bottom:10px;\n  }\n  .athlete .tag .num{color:var(--ink);font-weight:500;}\n  .athlete .name{font-size:17px;font-weight:500;margin-bottom:4px;}\n  .athlete .pos{font-size:13px;color:var(--ink-2);margin-bottom:8px;}\n  .athlete .since{font-family:\"IBM Plex Mono\",monospace;font-size:11px;color:var(--muted);letter-spacing:.06em;}\n  .roster-cta{margin-top:48px;text-align:center;}\n\n  /* === Partners (Marquee) === */\n  .partners-head{margin-bottom:48px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:end;}\n  .marquee{\n    border-top:1px solid var(--line);border-bottom:1px solid var(--line);\n    overflow:hidden;\n    mask-image:linear-gradient(90deg,transparent,#000 6%, #000 94%, transparent);\n    -webkit-mask-image:linear-gradient(90deg,transparent,#000 6%, #000 94%, transparent);\n  }\n  .marquee-row{display:flex;gap:0;white-space:nowrap;animation:scroll 90s linear infinite;}\n  .marquee-row.r2{animation-duration:120s;animation-direction:reverse;}\n  .marquee-row.r3{animation-duration:75s;}\n  .partner{\n    flex:0 0 auto;\n    padding:28px 36px;border-right:1px solid var(--line);\n    font-family:\"IBM Plex Mono\",monospace;font-size:13px;letter-spacing:.18em;text-transform:uppercase;\n    color:var(--ink-2);\n  }\n  .marquee + .marquee{border-top:0;}\n  @keyframes scroll{\n    from{transform:translateX(0);}\n    to{transform:translateX(-50%);}\n  }\n  .partners-foot{\n    display:flex;justify-content:space-between;align-items:center;\n    margin-top:32px;\n    font-family:\"IBM Plex Mono\",monospace;font-size:12px;color:var(--muted);\n    letter-spacing:.08em;\n  }\n\n  /* === Where Brunswick sits (Diagram) === */\n  .diagram-head{margin-bottom:64px;max-width:60ch;}\n  .diagram-head h2{margin-bottom:24px;}\n  .diagram{\n    display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;\n    position:relative;\n  }\n  .role{\n    border:1px solid var(--line);padding:32px 28px;background:var(--paper);\n    display:flex;flex-direction:column;gap:8px;min-height:200px;\n  }\n  .role.center{\n    border:1.5px solid var(--ink);background:#f3f3f3;\n    grid-column:2/3;grid-row:1/3;\n    transform:translateY(0);\n  }\n  .role .role-label{\n    font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);\n  }\n  .role.center .role-label{color:var(--ink);}\n  .role .role-name{font-size:28px;font-weight:500;letter-spacing:-0.01em;margin-top:4px;}\n  .role .role-sub{font-size:14px;color:var(--ink-2);margin-top:auto;}\n  .role.left{grid-column:1/2;grid-row:1/2;}\n  .role.right{grid-column:3/4;grid-row:1/2;}\n  .role.bl{grid-column:1/2;grid-row:2/3;}\n  .role.br{grid-column:3/4;grid-row:2/3;}\n  .role.center .role-name{font-size:34px;}\n  .role.center .pillars-list{\n    display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;\n    font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;\n  }\n  .role.center .pillars-list span{padding:5px 9px;border:1px solid var(--ink);}\n\n  /* === Why Brunswick === */\n  .why-head{margin-bottom:64px;max-width:60ch;}\n  .why-head h2{margin-bottom:24px;}\n  .why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--ink);}\n  .why-card{\n    padding:36px 32px 36px 0;border-right:1px solid var(--line);\n    display:flex;flex-direction:column;min-height:280px;\n  }\n  .why-card:not(:first-child){padding-left:32px;}\n  .why-card:last-child{border-right:0;padding-right:0;}\n  .why-card .ix{font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:32px;}\n  .why-card h3{margin-bottom:14px;}\n  .why-card p{color:var(--ink-2);margin-bottom:auto;}\n  .why-card .more{margin-top:24px;font-family:\"IBM Plex Mono\",monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;}\n\n  /* === Founder === */\n  .founder{display:grid;grid-template-columns:5fr 7fr;gap:64px;align-items:start;}\n  .founder-photo{\n    aspect-ratio:4/5;background:var(--box);\n    border:1px solid var(--line);\n    position:relative;display:grid;place-items:center;\n    color:var(--muted);font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;\n  }\n  .founder-photo::after{\n    content:\"\";position:absolute;inset:0;\n    background:\n      linear-gradient(45deg,transparent 49%,var(--line) 49% 51%, transparent 51%),\n      linear-gradient(-45deg,transparent 49%,var(--line) 49% 51%, transparent 51%);\n    opacity:.5;\n  }\n  .founder-photo span{position:relative;z-index:1;background:var(--box);padding:6px 10px;text-align:center;}\n  .founder-eyebrow{\n    font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:24px;\n  }\n  .founder h2{margin-bottom:32px;max-width:22ch;}\n  .pullquote{\n    font-family:\"IBM Plex Serif\", Georgia, serif;\n    font-size:24px;line-height:1.35;font-style:italic;\n    border-left:2px solid var(--ink);\n    padding:8px 0 8px 24px;\n    margin:0 0 32px;color:var(--ink);\n    max-width:48ch;\n  }\n  .founder-body{display:grid;gap:18px;color:var(--ink-2);max-width:60ch;margin-bottom:32px;}\n  .founder-sig{\n    font-family:\"IBM Plex Serif\", Georgia, serif;\n    font-style:italic;color:var(--ink);margin-bottom:24px;\n  }\n\n  /* === How we begin === */\n  .begin-head{margin-bottom:64px;max-width:60ch;}\n  .begin-head h2{margin-bottom:24px;}\n  .steps{display:grid;grid-template-columns:repeat(3,1fr);gap:0;}\n  .step{\n    padding:36px 32px 36px 0;border-right:1px solid var(--line);\n    position:relative;\n  }\n  .step:not(:first-child){padding-left:32px;}\n  .step:last-child{border-right:0;padding-right:0;}\n  .step .num{\n    font-family:\"IBM Plex Mono\",monospace;font-size:48px;font-weight:500;\n    color:var(--ink);letter-spacing:-0.02em;margin-bottom:32px;line-height:1;\n  }\n  .step h3{margin-bottom:12px;}\n  .step p{color:var(--ink-2);}\n\n  /* === FAQ === */\n  .faq-head{margin-bottom:64px;max-width:60ch;}\n  .faq-head h2{margin-bottom:24px;}\n  .faq-list{border-top:1px solid var(--line);}\n  .faq-item{border-bottom:1px solid var(--line);}\n  .faq-q{\n    display:grid;grid-template-columns:48px 1fr 32px;gap:24px;align-items:center;\n    padding:28px 0;cursor:pointer;width:100%;text-align:left;\n  }\n  .faq-q .qnum{\n    font-family:\"IBM Plex Mono\",monospace;font-size:13px;color:var(--muted);letter-spacing:.06em;\n  }\n  .faq-q .qtext{font-size:22px;font-weight:500;letter-spacing:-0.01em;}\n  .faq-q .qtog{\n    width:24px;height:24px;display:grid;place-items:center;font-family:\"IBM Plex Mono\",monospace;font-size:18px;\n    transition:transform .25s ease;justify-self:end;\n  }\n  .faq-item.is-open .qtog{transform:rotate(45deg);}\n  .faq-a{\n    max-height:0;overflow:hidden;\n    transition:max-height .35s ease, padding .25s ease;\n    padding-left:72px;padding-right:48px;\n    color:var(--ink-2);\n  }\n  .faq-item.is-open .faq-a{\n    max-height:300px;padding-bottom:32px;\n  }\n\n  /* === Footer CTA === */\n  .footer-cta{\n    background:#0e0e0e;color:#fff;padding:140px 0 96px;text-align:left;border-top:0;\n  }\n  .footer-cta .section-label{color:#7f7f7f;}\n  .footer-cta .section-label::before{background:#fff;}\n  .footer-cta h2{font-size:72px;line-height:1.05;letter-spacing:-0.02em;max-width:16ch;margin-bottom:48px;}\n  .footer-cta .btn{background:#fff;color:#111;border-color:#fff;}\n  .footer-cta .btn.ghost{background:transparent;color:#fff;border-color:#fff;}\n  .footer-form{\n    display:flex;gap:12px;max-width:560px;margin-top:8px;\n  }\n  .footer-form input{\n    flex:1;background:transparent;border:0;border-bottom:1px solid #555;\n    color:#fff;padding:14px 0;font:inherit;outline:none;\n  }\n  .footer-form input::placeholder{color:#888;}\n  .footer-bottom{\n    margin-top:140px;padding-top:32px;border-top:1px solid #2a2a2a;\n    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;\n    font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#7f7f7f;\n  }\n  .footer-cols{\n    display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:48px;margin-top:80px;\n  }\n  .footer-cols h4{\n    font-family:\"IBM Plex Mono\",monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7f7f7f;font-weight:400;margin-bottom:16px;\n  }\n  .footer-cols ul{list-style:none;padding:0;margin:0;display:grid;gap:10px;}\n  .footer-cols ul a{font-size:14px;color:#dedede;}\n  .footer-cols ul a:hover{color:#fff;}\n\n  /* Responsive niceties */\n  @media (max-width:1000px){\n    h1{font-size:48px;}\n    h2{font-size:34px;}\n    .pillars,.roster,.diagram,.why-grid,.steps{grid-template-columns:1fr 1fr;}\n    .role.center{grid-column:auto;grid-row:auto;}\n    .role.left,.role.right,.role.bl,.role.br{grid-column:auto;grid-row:auto;}\n    .pillars-head,.roster-head,.partners-head,.founder{grid-template-columns:1fr;gap:32px;}\n    .founder-photo{max-width:420px;}\n    .footer-cols{grid-template-columns:1fr 1fr;}\n  }\n  @media (max-width:640px){\n    :root{--pad:24px;}\n    h1{font-size:38px;}\n    h2{font-size:28px;}\n    .stat-bar{grid-template-columns:1fr;}\n    .stat{border-right:0;border-bottom:1px solid var(--line);}\n    .pillars,.roster,.diagram,.why-grid,.steps{grid-template-columns:1fr;}\n    .pillar,.why-card,.step{border-right:0;border-bottom:1px solid var(--line);padding:24px 0;}\n    .pillar:not(:first-child),.why-card:not(:first-child),.step:not(:first-child){padding-left:0;}\n    .footer-cta h2{font-size:44px;}\n    .footer-cols{grid-template-columns:1fr;}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- WIREFRAME BAR -->\n<div class=\"wf-bar\" role=\"banner\" aria-label=\"Wireframe annotation\">\n  <div><span class=\"dot\"><\u002Fspan>WIREFRAME · BRUNSWICK · v01 · MID-FI / GRAYSCALE<\u002Fdiv>\n  <div style=\"display:flex;gap:24px;\">\n    <a class=\"tab\" href=\"#hero\">HERO<\u002Fa>\n    <a class=\"tab\" href=\"#pillars\">PILLARS<\u002Fa>\n    <a class=\"tab\" href=\"#roster\">ROSTER<\u002Fa>\n    <a class=\"tab\" href=\"#partners\">PARTNERS<\u002Fa>\n    <a class=\"tab\" href=\"#diagram\">POSITION<\u002Fa>\n    <a class=\"tab\" href=\"#why\">WHY<\u002Fa>\n    <a class=\"tab\" href=\"#founder\">FOUNDER<\u002Fa>\n    <a class=\"tab\" href=\"#begin\">BEGIN<\u002Fa>\n    <a class=\"tab\" href=\"#faq\">FAQ<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- NAV -->\n<nav class=\"nav\" data-screen-label=\"00 Nav\">\n  <di elationships<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHAT WE DO -->\n<section id=\"pillars\" data-screen-label=\"02 Pillars\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">What we do<\u002Fdiv>\n    <div class=\"pillars-head\">\n      <h2>You're not just an athlete. You're a business.<\u002Fh2>\n      <p class=\"lede\">You're the brand, the media company, and the business — all at once. Brunswick is the boutique firm that runs that business alongside you, across four disciplines, at every stage of your career.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"pillars\">\n      <div class=\"pillar\">\n        <div class=\"idx\">01<\u002Fdiv>\n        <h3>Finance<\u002Fh3>\n        <p>Bookkeeping, LLCs, and in-house tax. Complete financial clarity, year-round.<\u002Fp>\n        <a href=\"#\" class=\"more\">Explore finance <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"idx\">02<\u002Fdiv>\n        <h3>Content<\u002Fh3>\n        <p>A full-stack content and brand engine that turns your platform into leverage.<\u002Fp>\n        <a href=\"#\" class=\"more\">Explore content <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"idx\">03<\u002Fdiv>\n        <h3>Community<\u002Fh3>\n        <p>Camps, charity, and appearances that build brand equity beyond the game.<\u002Fp>\n        <a href=\"#\" class=\"more\">Explore community <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"pillar\">\n        <div class=\"idx\">04<\u002Fdiv>\n        <h3>Concierge<\u002Fh3>\n        <p>Travel, family, relocation, and logistics — your week, handled.<\u002Fp>\n        <a href=\"#\" class=\"more\">Explore concierge <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- THE LOCKER ROOM -->\n<section id=\"roster\" data-screen-label=\"03 Roster\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">The locker room<\u002Fdiv>\n    <div class=\"roster-head\">\n      <h2>You're in good company.<\u002Fh2>\n      <p class=\"lede\">Pros across the NFL, NBA, and MLB trust Brunswick to run the business of their careers. Many have been with us for over a decade.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"filters\" role=\"tablist\" aria-label=\"Filter roster by league\">\n      <button class=\"filter is-active\" data-filter=\"all\">All · 8<\u002Fbutton>\n      <button class=\"filter\" data-filter=\"NFL\">NFL · 5<\u002Fbutton>\n      <button class=\"filter\" data-filter=\"NBA\">NBA · 2<\u002Fbutton>\n      <button class=\"filter\" data-filter=\"MLB\">MLB · 0<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"roster\" id=\"rosterGrid\">\n      <div class=\"athlete\" data-league=\"NBA\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">01<\u002Fspan><span>NBA<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Center<\u002Fdiv>\n          <div class=\"since\">Client since 2018<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"athlete\" data-league=\"NFL\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">02<\u002Fspan><span>NFL<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Defensive Tackle<\u002Fdiv>\n          <div class=\"since\">Client since 2019<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"athlete\" data-league=\"NFL\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">03<\u002Fspan><span>NFL<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Wide Receiver<\u002Fdiv>\n          <div class=\"since\">Client since 2020<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"athlete\" data-league=\"NFL\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">04<\u002Fspan><span>NFL<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Cornerback<\u002Fdiv>\n          <div class=\"since\">Client since 2021<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"athlete\" data-league=\"NFL\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">05<\u002Fspan><span>NFL<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Running Back<\u002Fdiv>\n          <div class=\"since\">Client since 2019<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"athlete\" data-league=\"NBA\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">06<\u002Fspan><span>NBA<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Guard<\u002Fdiv>\n          <div class=\"since\">Client since 2022<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"athlete\" data-league=\"NFL\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">07<\u002Fspan><span>NFL<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Linebacker<\u002Fdiv>\n          <div class=\"since\">Client since 2018<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"athlete\" data-league=\"NFL\">\n        <div class=\"photo\"><span>Photo · 4:5<\u002Fspan><\u002Fdiv>\n        <div class=\"meta\">\n          <div class=\"tag\"><span class=\"num\">08<\u002Fspan><span>NFL<\u002Fspan><\u002Fdiv>\n          <div class=\"name\">Athlete Name<\u002Fdiv>\n          <div class=\"pos\">Team · Safety<\u002Fdiv>\n          <div class=\"since\">Client since 2020<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"roster-cta\">\n      <a href=\"#\" class=\"btn ghost\">View the full roster <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PARTNERS -->\n<section id=\"partners\" data-screen-label=\"04 Partners\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">Partners &amp; endorsements<\u002Fdiv>\n    <div class=\"partners-head\">\n      <h2>The brands our athletes work with.<\u002Fh2>\n      <p class=\"lede\">Brunswick runs the brand business behind the roster — placement, negotiation, activation. A selection of partners we've worked with on behalf of our athletes, across performance, lifestyle, hospitality, finance, and culture.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Marquees -->\n  <div class=\"marquee\" aria-hidden=\"false\">\n    <div class=\"marquee-row\" id=\"mq1\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"marquee\">\n    <div class=\"marquee-row r2\" id=\"mq2\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"marquee\">\n    <div class=\"marquee-row r3\" id=\"mq3\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"wrap\">\n    <div class=\"partners-foot\">\n      <span>A working sample · partners shown with client permission<\u002Fspan>\n      <a href=\"#contact\" class=\"more\" style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;\">Inquire about partnerships <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHERE BRUNSWICK SITS -->\n<section id=\"diagram\" data-screen-label=\"05 Position\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">Where Brunswick sits<\u002Fdiv>\n    <div class=\"diagram-head\">\n      <h2>Agent. Advisor. Brand. We run everything in between.<\u002Fh2>\n      <p class=\"lede\">You already have people negotiating contracts and managing investments. Brunswick is the operating layer that connects them — and handles everything they don't.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"diagram\" aria-label=\"Brunswick position diagram\">\n      <div class=\"role left\">\n        <div class=\"role-label\">Agent<\u002Fdiv>\n        <div class=\"role-name\">Contracts<\u002Fdiv>\n        <div class=\"role-sub\">Deals &amp; team relations.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"role center\">\n        <div class=\"role-label\">Brunswick<\u002Fdiv>\n        <div class=\"role-name\">Operations<\u002Fdiv>\n        <div class=\"pillars-list\">\n          <span>Finance<\u002Fspan><span>Content<\u002Fspan><span>Community<\u002Fspan><span>Day-to-day<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"role-sub\">The operating layer connecting your agent, advisor, and brand partners.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"role right\">\n        <div class=\"role-label\">Advisor<\u002Fdiv>\n        <div class=\"role-name\">Wealth<\u002Fdiv>\n        <div class=\"role-sub\">Investments &amp; retirement.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"role bl\" style=\"visibility:hidden;\"><\u002Fdiv>\n      <div class=\"role br\">\n        <div class=\"role-label\">Brand<\u002Fdiv>\n        <div class=\"role-name\">Endorsements<\u002Fdiv>\n        <div class=\"role-sub\">Partnerships &amp; sponsors.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHY BRUNSWICK -->\n<section id=\"why\" data-screen-label=\"06 Why\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">Why Brunswick<\u002Fdiv>\n    <div class=\"why-head\">\n      <h2>A boutique firm, by design.<\u002Fh2>\n      <p class=\"lede\">We keep the roster small on purpose. It's how every client gets the attention, discretion, and senior focus they deserve.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"why-grid\">\n      <div class=\"why-card\">\n        <div class=\"ix\">01 · One roof<\u002Fdiv>\n        <h3>Everything in-house.<\u002Fh3>\n        <p>Finance, tax, content, and concierge — all under one roof. No handoffs, no finger-pointing.<\u002Fp>\n        <a href=\"#\" class=\"more\">How we work <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"why-card\">\n        <div class=\"ix\">02 · Elite experience<\u002Fdiv>\n        <h3>Built alongside the best.<\u002Fh3>\n        <p>Developed with All-NBA and All-Star caliber talent, now applied to every athlete on the roster.<\u002Fp>\n        <a href=\"#roster\" class=\"more\">See the roster <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <div class=\"why-card\">\n        <div class=\"ix\">03 · Technology-native<\u002Fdiv>\n        <h3>Tech that runs quietly.<\u002Fh3>\n        <p>Founded by an operator with 10+ years in software. Technology runs quietly in the background.<\u002Fp>\n        <a href=\"#founder\" class=\"more\">Our story <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOUNDER -->\n<section id=\"founder\" data-screen-label=\"07 Founder\">\n  <div class=\"wrap\">\n    <div class=\"founder\">\n      <div>\n        <div class=\"founder-photo\"><span>Photo · Julian Aiken<br>Founder &amp; Managing Partner<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div class=\"founder-eyebrow\">Julian Aiken · Founder &amp; Managing Partner<\u002Fdiv>\n        <h2>It started around the game. Then I learned the business of it.<\u002Fh2>\n        <blockquote class=\"pullquote\">\"Access without intention is just a story to tell at a party. Access with intention is an education you can't buy.\"<\u002Fblockquote>\n        <div class=\"founder-body\">\n          <p>Julian grew up around the NBA — his uncle played seven years in the league. He spent nearly two years working in the industry for free, learning the business cold. In 2018, one yes turned into six clients. Today, Brunswick manages 35+.<\u002Fp>\n          <p>Julian is the relationship. But his commitment to every athlete is backed by a full team running finance, content, community, and day-to-day — so nothing depends on one person alone.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"founder-sig\">— Julian Aiken<\u002Fdiv>\n        <a href=\"#\" class=\"btn ghost\">Read Julian's full story <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW WE BEGIN -->\n<section id=\"begin\" data-screen-label=\"08 Begin\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">How we begin<\u002Fdiv>\n    <div class=\"begin-head\">\n      <h2>A relationship, built the right way.<\u002Fh2>\n      <p class=\"lede\">Most of our clients come by referral. The first conversation is private, and entirely about you.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"steps\">\n      <div class=\"step\">\n        <div class=\"num\">01<\u002Fdiv>\n        <h3>A private conversation<\u002Fh3>\n        <p>We sit down to understand your goals, your career, and where you want to take the business.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"num\">02<\u002Fdiv>\n        <h3>Your game plan<\u002Fh3>\n        <p>We map your finances, content, and brand, and show you the biggest opportunities ahead.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"step\">\n        <div class=\"num\">03<\u002Fdiv>\n        <h3>We go to work<\u002Fh3>\n        <p>One coordinated team runs the business of your career — so you can focus on the game.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FAQ -->\n<section id=\"faq\" data-screen-label=\"09 FAQ\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">Before you ask<\u002Fdiv>\n    <div class=\"faq-head\">\n      <h2>The questions athletes ask us first.<\u002Fh2>\n    <\u002Fdiv>\n\n    <div class=\"faq-list\">\n      <div class=\"faq-item is-open\">\n        <button class=\"faq-q\" aria-expanded=\"true\">\n          <span class=\"qnum mono\">01<\u002Fspan>\n          <span class=\"qtext\">Do you replace my agent or financial advisor?<\u002Fspan>\n          <span class=\"qtog\">+<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\">\n          <p>No. We complete the team. Brunswick runs the day-to-day operations and connects your agent, advisor, and brand partners — so everyone works from clean, real-time information.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          <span class=\"qnum mono\">02<\u002Fspan>\n          <span class=\"qtext\">Is everything confidential?<\u002Fspan>\n          <span class=\"qtog\">+<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\">\n          <p>Always. Discretion is the foundation of this business. Your information, your finances, and your privacy are protected at every step.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          <span class=\"qnum mono\">03<\u002Fspan>\n          <span class=\"qtext\">I'm a college / NIL athlete. Is it too early?<\u002Fspan>\n          <span class=\"qtog\">+<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\">\n          <p>It's the perfect time. Athletes who treat NIL income like a business from day one arrive in the pros already positioned — and never have to untangle a mess later.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          <span class=\"qnum mono\">04<\u002Fspan>\n          <span class=\"qtext\">How do I know it's working?<\u002Fspan>\n          <span class=\"qtog\">+<\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\">\n          <p>Clean books on every entity, real-time financials, a growing brand, and a week that belongs to you again. You'll feel the difference in the first month.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER CTA -->\n<section class=\"footer-cta\" id=\"contact\" data-screen-label=\"10 Contact\">\n  <div class=\"wrap\">\n    <div class=\"section-label\">By introduction<\u002Fdiv>\n    <h2>Let's build something that lasts.<\u002Fh2>\n\n    <div class=\"hero-ctas\" style=\"margin-bottom:24px;\">\n      <a href=\"#\" class=\"btn\">Request an introduction <span class=\"arr\">→<\u002Fspan><\u002Fa>\n      <a href=\"#\" class=\"btn ghost\">Email the founder <span class=\"arr\">→<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n\n    <form class=\"footer-form\" onsubmit=\"event.preventDefault();\">\n      <input type=\"text\" placeholder=\"Name\">\n      <input type=\"email\" placeholder=\"Email\">\n      <button class=\"btn\" type=\"submit\">Send <span class=\"arr\">→<\u002Fspan><\u002Fbutton>\n    <\u002Fform>\n\n    <div class=\"footer-cols\">\n      <div>\n        <div class=\"logo\" style=\"color:#fff;\">\n          <span class=\"logo-mark\" style=\"border-color:#fff;color:#fff;\">B<\u002Fspan>\n          <span>Brunswick<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"color:#9a9a9a;max-width:36ch;margin-top:16px;font-size:14px;\">A boutique management firm built for the modern athlete. By referral.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h4>Practice<\u002Fh4>\n        <ul>\n          <li><a href=\"#\">Finance<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Content<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Community<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Concierge<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h4>Firm<\u002Fh4>\n        <ul>\n          <li><a href=\"#roster\">Roster<\u002Fa><\u002Fli>\n          <li><a href=\"#partners\">Partners<\u002Fa><\u002Fli>\n          <li><a href=\"#founder\">Founder<\u002Fa><\u002Fli>\n          <li><a href=\"#faq\">FAQ<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h4>Contact<\u002Fh4>\n        <ul>\n          <li><a href=\"#\">hello@brunswick.co<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Press inquiries<\u002Fa><\u002Fli>\n          <li><a href=\"#\">Careers<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"footer-bottom\">\n      <span>© 2026 Brunswick Management<\u002Fspan>\n      <span>NFL · NBA · MLB · NIL<\u002Fspan>\n      <span>Privacy · Terms<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n  // --- Smooth scroll (offset for sticky nav) ---\n  document.querySelectorAll('a[href^=\"#\"]').forEach(a=>{\n    a.addEventListener('click', e=>{\n      const id = a.getAttribute('href');\n      if(id.length<2) return;\n      const t = document.querySelector(id);\n      if(!t) return;\n      e.preventDefault();\n      const y = t.getBoundingClientRect().top + window.scrollY - 100;\n      window.scrollTo({top:y, behavior:'smooth'});\n    });\n  });\n\n  // --- FAQ accordion ---\n  document.querySelectorAll('.faq-q').forEach(q=>{\n    q.addEventListener('click', ()=>{\n      const item = q.parentElement;\n      const isOpen = item.classList.contains('is-open');\n      item.classList.toggle('is-open');\n      q.setAttribute('aria-expanded', String(!isOpen));\n    });\n  });\n\n  // --- Roster filter ---\n  const filters = document.querySelectorAll('.filter');\n  const cards = document.querySelectorAll('.athlete');\n  filters.forEach(f=>{\n    f.addEventListener('click', ()=>{\n      filters.forEach(x=>x.classList.remove('is-active'));\n      f.classList.add('is-active');\n      const v = f.dataset.filter;\n      cards.forEach(c=>{\n        const show = v==='all' || c.dataset.league===v;\n        c.style.display = show ? '' : 'none';\n      });\n    });\n  });\n\n  // --- Partner marquees (populate + duplicate for seamless loop) ---\n  const partnerSets = [\n    [\"NIKE\",\"NEW BALANCE\",\"MACKAGE\",\"NOBULL\",\"HOLLISTER\",\"FASHION NOVA\",\"P448\",\"TRAVIS MATHEW\",\"OAKLEY\",\"SERATELLI HATS\",\"SLIP SILK\",\"ANTA\",\"STRIA SPORT\",\"BETTINARDI\",\"GATORADE\",\"ZENWTR\",\"RECOVER 180\",\"HYDRO FLASK\"],\n    [\"RAISING CANE'S\",\"7-ELEVEN\",\"24 HOUR ENERGY\",\"LOUIS XIII\",\"REMY MARTIN\",\"MR PORTER\",\"NET-A-PORTER\",\"VENUS ET FLEUR\",\"DOVE\",\"DOLLAR SHAVE CLUB\",\"GILLETTE\",\"CVS\",\"MET-RX\",\"NEOSCULPT\",\"SOUR PUNCH\",\"GQ\",\"ENTREPRENEUR\",\"SLATE\"],\n    [\"TOPPS\",\"FANATICS\",\"EBAY\",\"WHATNOT\",\"DYNASTY SPORTS\",\"I LOVE BOSTON SPORTS\",\"EAST COAST COLLECTIBLES\",\"CONCEPTS\",\"POSTGAME OFFICIAL\",\"DRAFTKINGS\",\"OPENDORSE\",\"EQLZ\",\"JORDAN'S FURNITURE\",\"TARGET\",\"SHARK NINJA\",\"MORGAN & MORGAN\",\"BIG BROTHERS BIG SISTERS\"]\n  ];\n  [\"mq1\",\"mq2\",\"mq3\"].forEach((id,i)=>{\n    const row = document.getElementById(id);\n    const items = partnerSets[i];\n    const html = items.map(n=>`<div class=\"partner\">${n}<\u002Fdiv>`).join('');\n    row.innerHTML = html + html; // duplicate for seamless scroll\n  });\n\n  // --- Active section highlight in wireframe tabs ---\n  const tabs = document.querySelectorAll('.wf-bar .tab');\n  const sections = ['hero','pillars','roster','partners','diagram','why','founder','begin','faq'].map(id=>document.getElementById(id));\n  function syncTab(){\n    const y = window.scrollY + 200;\n    let cur = sections[0];\n    sections.forEach(s=>{ if(s && s.offsetTop <= y) cur = s; });\n    tabs.forEach(t=>{\n      const on = t.getAttribute('href') === '#'+(cur && cur.id);\n      t.style.opacity = on ? '1' : '.6';\n    });\n  }\n  window.addEventListener('scroll', syncTab, {passive:true});\n  syncTab();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
